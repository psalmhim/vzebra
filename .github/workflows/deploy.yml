name: Deploy vzebra

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to vzebra.xaiforbrain.com
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.209.16.188
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/ubuntu/vzebra

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/psalmhim/vzebra.git "$APP_DIR"
            fi

            git -C "$APP_DIR" pull origin main

            docker compose -f "$APP_DIR/docker-compose.yml" build vzebra
            docker compose -f "$APP_DIR/docker-compose.yml" up -d vzebra

            # Phase 1: port-80 only nginx config so certbot can verify
            if [ ! -f "/etc/letsencrypt/live/vzebra.xaiforbrain.com/fullchain.pem" ]; then
              cat > /tmp/vzebra-http.conf <<'NGINX'
            server {
                listen 80;
                server_name vzebra.xaiforbrain.com;
                location /.well-known/acme-challenge/ { root /var/www/html; }
                location / { proxy_pass http://127.0.0.1:5001; }
            }
            NGINX
              sudo cp /tmp/vzebra-http.conf /etc/nginx/sites-available/vzebra.xaiforbrain.com
              sudo ln -sf /etc/nginx/sites-available/vzebra.xaiforbrain.com \
                          /etc/nginx/sites-enabled/vzebra.xaiforbrain.com
              sudo nginx -t && sudo systemctl reload nginx

              sudo certbot certonly --webroot \
                -w /var/www/html \
                -d vzebra.xaiforbrain.com \
                --non-interactive --agree-tos \
                -m hangik.lee@gmail.com
            fi

            # Phase 2: full HTTPS nginx config
            sudo cp "$APP_DIR/deploy/nginx-vzebra.conf" \
                    "/etc/nginx/sites-available/vzebra.xaiforbrain.com"
            sudo ln -sf "/etc/nginx/sites-available/vzebra.xaiforbrain.com" \
                        "/etc/nginx/sites-enabled/vzebra.xaiforbrain.com"
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deployed at $(date)"
