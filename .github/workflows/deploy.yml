name: Deploy vzebra

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to vzebra.xaiforbrain.com
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.209.16.188
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/ubuntu/vzebra

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/psalmhim/vzebra.git "$APP_DIR"
            fi

            git -C "$APP_DIR" fetch origin main
            CHANGED=$(git -C "$APP_DIR" diff HEAD origin/main --name-only)
            git -C "$APP_DIR" pull origin main

            # Rebuild only if Docker config or dependencies changed; otherwise just restart
            if echo "$CHANGED" | grep -qE 'Dockerfile|requirements.txt'; then
              echo "=== Rebuilding Docker image ==="
              docker compose -f "$APP_DIR/docker-compose.yml" build vzebra
              docker compose -f "$APP_DIR/docker-compose.yml" up -d vzebra
            else
              echo "=== Code-only change — restarting container ==="
              docker compose -f "$APP_DIR/docker-compose.yml" restart vzebra
            fi

            # Self-signed cert (once only)
            if [ ! -f "/etc/ssl/vzebra/fullchain.pem" ]; then
              sudo mkdir -p /etc/ssl/vzebra
              sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout /etc/ssl/vzebra/privkey.pem \
                -out /etc/ssl/vzebra/fullchain.pem \
                -subj "/CN=vzebra.xaiforbrain.com"
            fi

            # Nginx config (always sync latest)
            sudo cp "$APP_DIR/deploy/nginx-vzebra.conf" \
                    "/etc/nginx/sites-available/vzebra.xaiforbrain.com"
            sudo ln -sf "/etc/nginx/sites-available/vzebra.xaiforbrain.com" \
                        "/etc/nginx/sites-enabled/vzebra.xaiforbrain.com"
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deployed at $(date)"
