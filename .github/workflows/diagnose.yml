name: Diagnose vzebra

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.209.16.188
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            echo "=== Docker containers ==="
            docker ps -a

            echo ""
            echo "=== vzebra container logs (last 50 lines) ==="
            docker logs --tail 50 vzebra 2>&1 || echo "(no container named vzebra)"

            echo ""
            echo "=== Port 5001 ==="
            ss -tlnp | grep 5001 || echo "(nothing on 5001)"

            echo ""
            echo "=== Disk space ==="
            df -h /

            echo ""
            echo "=== Memory ==="
            free -h

            echo ""
            echo "=== Nginx sites-enabled ==="
            ls -la /etc/nginx/sites-enabled/

            echo ""
            echo "=== vzebra nginx config ==="
            cat /etc/nginx/sites-available/vzebra.xaiforbrain.com 2>/dev/null || echo "(not found)"

            echo ""
            echo "=== Self-signed cert ==="
            ls -la /etc/ssl/vzebra/ 2>/dev/null || echo "(no /etc/ssl/vzebra)"

            echo ""
            echo "=== Nginx test ==="
            sudo nginx -t 2>&1

            echo ""
            echo "=== Port 443 listeners ==="
            ss -tlnp | grep 443 || echo "(nothing on 443)"

            echo ""
            echo "=== Test vzebra HTTPS locally ==="
            curl -sk -o /dev/null -w "%{http_code}" -H "Host: vzebra.xaiforbrain.com" https://localhost/api/status || echo "failed"

            echo ""
            echo "=== Lab nginx config ==="
            cat /etc/nginx/sites-enabled/lab.xaiforbrain.com 2>/dev/null | head -20
