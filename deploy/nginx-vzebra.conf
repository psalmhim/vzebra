# /etc/nginx/sites-available/vzebra.xaiforbrain.com
# Symlink: sudo ln -s /etc/nginx/sites-available/vzebra.xaiforbrain.com \
#                      /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name vzebra.xaiforbrain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name vzebra.xaiforbrain.com;

    # SSL — filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/vzebra.xaiforbrain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vzebra.xaiforbrain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Compress JSON/HTML responses
    gzip on;
    gzip_types text/plain application/json text/javascript text/css;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections open (idle demo sends every 0.15s)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # Serve large static JSON files with caching
    location /static/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # GitHub webhook — auto-redeploy on push to main
    location /deploy/webhook {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
