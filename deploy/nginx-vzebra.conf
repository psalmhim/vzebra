# /etc/nginx/sites-available/vzebra.xaiforbrain.com
# Cloudflare terminates SSL — nginx speaks plain HTTP on port 80

server {
    listen 80;
    server_name vzebra.xaiforbrain.com;

    gzip on;
    gzip_types text/plain application/json text/javascript text/css;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:5001;
        add_header Cache-Control "public, max-age=3600";
    }

    location /deploy/webhook {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
