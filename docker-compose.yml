services:
  vzebra:
    build:
      context: .
      dockerfile: Dockerfile
    image: vzebra:latest
    container_name: vzebra
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PRODUCTION: "1"
    volumes:
      # Live code mounts — git pull on host reflects immediately, restart only needed
      - ./zebrav2:/app/zebrav2
      - ./zebrav1:/app/zebrav1
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
